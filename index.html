<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Password Generator</title>
    </head>
    <body>
        <h1>Password Generator</h1>
        <div id="options">
            <input type="checkbox" name="upper" id="upper">
            <label for="upper">Uppercase characters</label>
            <br>
            <input type="checkbox" name="numbers" id="numbers">
            <label for="upper">Numbers</label>
            <br>
            <input type="checkbox" name="symbols" id="symbols">
            <label for="upper">Symbols</label>
            <br>
            <p>Length</p>
            <input type="number" id="length1" min="1" max="128">
        </div>
        <button id="genbutton">Generate!</button>
        <p id="gentext"></p>
        <script src="script.js"></script>
    </body>
</html>
